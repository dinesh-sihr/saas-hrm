<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SHNOOR - HRM</title>
    
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('theme');
          var isDark = theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (isDark) {
            document.documentElement.classList.add('dark');
            document.documentElement.style.backgroundColor = '#0f172a';
          } else {
            document.documentElement.style.backgroundColor = '#f8fafc';
          }
        } catch (e) {}
      })();
    </script>
    
    <style>
      body {
        background-color: #f8fafc;
        margin: 0;
        font-family: system-ui, -apple-system, sans-serif;
      }
      .dark body {
        background-color: #0f172a;
      }
    </style>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap"></noscript>
  </head>
  <body>
    <div id="root">
      <!-- High-performance inline pre-loader skeleton for instantaneous FCP < 0.3s -->
      <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: system-ui, -apple-system, sans-serif; gap: 1.5rem; transition: opacity 0.3s;">
        <div style="font-size: 2.25rem; font-weight: 800; letter-spacing: 2px; color: #1e293b; text-align: center; text-transform: uppercase;">
          SHNOOR
          <span style="display: block; font-size: 0.65rem; font-weight: 800; letter-spacing: 4px; color: #94a3b8; margin-top: 0.5rem; text-transform: uppercase;">SECURE CLOUD PORTAL</span>
        </div>
        <div style="width: 2.5rem; height: 2.5rem; border: 3px solid rgba(37, 99, 235, 0.1); border-top-color: #2563eb; border-radius: 50%; animation: spin 1s linear infinite;"></div>
        <style>
          @keyframes spin {
            to { transform: rotate(360deg); }
          }
          .dark div {
            color: #f8fafc !important;
          }
          .dark span {
            color: #64748b !important;
          }
          .dark div[style*="border-top-color"] {
            border-color: rgba(59, 130, 246, 0.15) !important;
            border-top-color: #3b82f6 !important;
          }
        </style>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
