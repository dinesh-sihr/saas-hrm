<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="SHNOOR - Secure Cloud HRM Portal for managing employees, payroll, attendance and leaves." />
    <title>SHNOOR - HRM</title>

    <script>
      (function() {
        try {
          var theme = localStorage.getItem('theme');
          var isDark = theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (isDark) {
            document.documentElement.classList.add('dark');
            document.documentElement.style.backgroundColor = '#0f172a';
          } else {
            document.documentElement.style.backgroundColor = '#f8fafc';
          }
        } catch (e) {}
      })();
    </script>

    <style>
      *{margin:0;padding:0;box-sizing:border-box}
      body{font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;background-color:#f8fafc;color:#1e293b;-webkit-font-smoothing:antialiased}
      .dark body{background-color:#0f172a;color:#f8fafc}
      #loading-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem;position:relative;overflow:hidden}
      .login-shell{width:100%;max-width:32rem;padding:3.5rem;display:flex;flex-direction:column;gap:2.5rem;z-index:1;background-color:rgba(255,255,255,0.9);border:1px solid rgba(226,232,240,1);border-radius:1.5rem;backdrop-filter:blur(16px);box-shadow:0 10px 40px -10px rgba(0,0,0,0.05)}
      .dark .login-shell{background-color:rgba(30,41,59,0.7);border-color:rgba(255,255,255,0.1)}
      .login-shell .top{text-align:center}
      .login-shell .shield{display:inline-flex;padding:1rem;border-radius:1.5rem;background-color:rgba(37,99,235,0.1);color:#2563eb;margin-bottom:1rem}
      .dark .login-shell .shield{background-color:rgba(59,130,246,0.15);color:#3b82f6}
      .login-shell h1{font-size:2.5rem;font-weight:800;margin:0}
      .login-shell .sub{font-size:0.65rem;font-weight:800;text-transform:uppercase;letter-spacing:0.12em;color:#475569;opacity:0.5;margin-top:0.5rem}
      .dark .login-shell .sub{color:#cbd5e1}
      .login-shell .fields{display:flex;flex-direction:column;gap:1.5rem;width:100%}
      .login-shell .field{width:100%;display:flex;flex-direction:column}
      .login-shell label{display:block;font-size:0.65rem;font-weight:800;text-transform:uppercase;letter-spacing:0.12em;color:#475569;margin-bottom:0.5rem}
      .dark .login-shell label{color:#cbd5e1}
      .login-shell .inp-wrap{position:relative;width:100%;display:flex;align-items:center}
      .login-shell .inp-wrap svg{position:absolute;left:1.25rem;color:#94a3b8;pointer-events:none}
      .dark .login-shell .inp-wrap svg{color:#64748b}
      .login-shell input{width:100%;height:3.5rem;padding:0 1rem 0 3.5rem;border-radius:1.25rem;border:1px solid #e2e8f0;background-color:#fff;color:#1e293b;font-family:inherit;font-size:0.95rem;outline:none}
      .dark .login-shell input{border-color:rgba(255,255,255,0.1);background-color:rgba(15,23,42,0.4);color:#f8fafc}
      .login-shell button{width:100%;height:3.5rem;background-color:#2563eb;color:#fff;font-weight:700;font-size:1rem;border-radius:1.25rem;display:flex;align-items:center;justify-content:center;gap:0.75rem;border:none;cursor:pointer;box-shadow:0 4px 12px rgba(37,99,235,0.1)}
      .dark .login-shell button{background-color:#3b82f6}
      .login-shell .bottom{text-align:center;font-size:0.875rem;color:#475569}
      .dark .login-shell .bottom{color:#cbd5e1}
      .login-shell .bottom a{color:#2563eb;font-weight:700;text-decoration:none}
      .dark .login-shell .bottom a{color:#3b82f6}
      .glow-orb{position:absolute;width:25rem;height:25rem;border-radius:50%;filter:blur(80px);background-color:rgba(37,99,235,0.1)}
      .dark .glow-orb{background-color:rgba(59,130,246,0.15)}
      @media(max-width:768px){.login-shell h1{font-size:1.75rem}.login-shell{padding:2rem}}
    </style>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap"></noscript>
  </head>
  <body>
    <div id="loading-screen">
      <div class="glow-orb" style="top:-10%;right:-10%"></div>
      <div class="glow-orb" style="bottom:-10%;left:-10%"></div>
      <div class="login-shell">
        <div class="top">
          <div class="shield">
            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path><path d="M9 12l2 2 4-4"></path></svg>
          </div>
          <h1>SHNOOR</h1>
          <p class="sub">Secure Cloud HRM Portal</p>
        </div>
        <div class="fields">
          <div class="field">
            <label>Email Address</label>
            <div class="inp-wrap">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
              <input type="email" placeholder="name@company.com" disabled />
            </div>
          </div>
          <div class="field">
            <label>Password</label>
            <div class="inp-wrap">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              <input type="password" placeholder="••••••••" disabled />
            </div>
          </div>
          <button disabled>
            <span>Sign In</span>
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
          </button>
        </div>
        <div class="bottom">
          <p>Don't have an account? <a href="/register">Join SHNOOR</a></p>
        </div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
